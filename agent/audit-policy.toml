schema_version = "1.0.0"
workspace = "jeryu-intelligence"
minimum_score = 85
hard_findings_allowed = 0
required_tool = "jankurai"
required_tool_version = "1.6.10"

# The `[dead_language] allow_terms` mechanism (jankurai >= 1.6.1) suppresses ONLY
# these exact words for the dead-marker check; every other dead-language,
# fallback-soup, and security check still runs on the same files. Each term is
# justified below; this is a reviewed, documented decision carried over from the
# monorepo policy (process markers like todo/fixme/hack/stub are deliberately
# NOT listed).
#
#   stale       -> GitHub CheckConclusion REST value "stale" (wire mapping; the
#                  Rust variant is renamed `Superseded`, but the wire STRING must
#                  stay); SPA-facing backend error codes (merge_sha_stale /
#                  merge_passport_stale / settings_hash_stale); the GitHub
#                  `dismiss_stale_approvals` branch-protection field.
#   placeholder -> the HTML `<input placeholder>` attribute / React prop name.
#   fallback    -> the React `<Suspense fallback>` / ErrorBoundary prop name.
#   old         -> unified-diff side labels + git ref-update `<old-oid> <new-oid>`.
[dead_language]
allow_terms = ["stale", "placeholder", "fallback", "old"]

[scan]
# Excluded from scanning because it is NOT product code (carried over from the
# reviewed monorepo policy): the auditor's OWN output — auditing the auditor's
# artifacts is circular.
excluded_paths = [
  ".jankurai/",
]
