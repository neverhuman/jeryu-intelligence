schema_version = "1.0.0"
workspace = "jeryu-intelligence"
profile = "rust-workspace"
required_check = "jeryu-intelligence/required"

[split]
cross_repo_dependency_policy = "pinned-public-git-tags"
local_path_patches = false

cargo_members = [
  "crates/jeryu-codegraph",
  "crates/jeryu-rustjet",
  "crates/jeryu-rustjet-cli",
  "crates/jeryu-mcp",
  "crates/jeryu-review",
  "crates/jeryu-autonomy",
]
